name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Require a changeset for public package changes
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: npx changeset status --since="${{ github.event.pull_request.base.sha }}"

      - name: Build publishable packages
        run: npm run build:packages

      - name: Typecheck
        run: npm run typecheck

      - name: Validate package tarballs and MCP metadata
        run: npm run check:packages

      - name: Build playground
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run biomechanical evals
        run: npm run eval
