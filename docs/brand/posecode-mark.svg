<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Posecode">
  <!-- The Posecode mark: a kinematic figure in an open, energetic pose. Bones are
       strokes, joints are markers — the same rig the app animates. Uses
       currentColor so it inherits the surrounding text color (lime by default). -->
  <g fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 34 V55"/>
    <path d="M50 35 L34 26 L23 15"/>
    <path d="M50 35 L66 26 L77 15"/>
    <path d="M50 54 L36 72 L28 88"/>
    <path d="M50 54 L64 72 L72 88"/>
  </g>
  <circle cx="50" cy="20" r="9" fill="currentColor"/>
</svg>
